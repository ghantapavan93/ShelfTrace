services:
  postgres:
    image: postgres:15-alpine
    container_name: shelftrace-postgres
    environment:
      POSTGRES_USER: shelftrace
      POSTGRES_PASSWORD: shelftrace
      POSTGRES_DB: shelftrace_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelftrace"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shelftrace-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shelftrace-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://shelftrace:shelftrace@postgres:5432/shelftrace_db
      REDIS_URL: redis://redis:6379/0
      DEMO_MODE: "true"
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shelftrace-worker
    environment:
      DATABASE_URL: postgresql+psycopg2://shelftrace:shelftrace@postgres:5432/shelftrace_db
      REDIS_URL: redis://redis:6379/0
      DEMO_MODE: "true"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m app.worker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shelftrace-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
